name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: List files for debugging
      run: |
        echo "Current directory:"
        dir
        echo ""
        echo "Looking for .csproj files:"
        dir /s *.csproj
      shell: cmd

    - name: Restore NuGet Packages
      run: |
        cd CyberSecurityChatBot-Part2
        msbuild CyberSecurityChatBot-Part2.csproj /t:Restore /p:Configuration=Release
      shell: cmd

    - name: Build the Application
      run: |
        cd CyberSecurityChatBot-Part2
        msbuild CyberSecurityChatBot-Part2.csproj /p:Configuration=Release /p:Platform="Any CPU"
      shell: cmd
