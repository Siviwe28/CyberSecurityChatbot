# This YAML file defines a workflow for building a .NET desktop application.
name: .NET Core Desktop

# This triggers the workflow on pushes or pull requests to the 'main' branch.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A workflow run is made up of one or more jobs.
jobs:
  build:
    # The type of runner that the job will run on. **WPF requires Windows.**
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed.
    steps:
    # 1. Checks-out your repository under $GITHUB_WORKSPACE, so the job can access it.
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Installs the .NET SDK.
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Or your target version

    # 3. Installs MSBuild, a key tool for building .NET Framework/WPF projects.
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # 4. Restores the NuGet packages your project depends on.
    - name: Restore Packages
      run: msbuild CyberSecurityChatBot-Part2.csproj /t:Restore /p:Configuration=Release

    # 5. Builds your project.
    - name: Build the Application
      # Adjust the project filename if it's different.
      run: msbuild CyberSecurityChatBot-Part2.csproj /p:Configuration=Release /p:Platform="Any CPU"
